# Copy command wrapper (falls back to no-op if no display)
COPY_CMD="$HOME/.local/bin/tmux-copy"

# Prefix: Ctrl+Space
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# show messages for 4 seconds instead
set -g display-time 4000

###############################################################################
### Plugins
###############################################################################

# Set up plugin manager
set-environment -gF TMUX_CONF_PATH '#{HOME}/.config/tmux'
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{TMUX_CONF_PATH}/plugins'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'dreknix/tmux-primary-ip'

###############################################################################
### Macchiato color palette
###############################################################################

set -g @c_bg "#24273a"
set -g @c_fg "#cad3f5"
set -g @c_red "#ed8796"
set -g @c_green "#a6da95"
set -g @c_yellow "#eed49f"
set -g @c_blue "#8aadf4"
set -g @c_maroon "#ee99a0"
set -g @c_peach "#f5a97f"
set -g @c_lavender "#b7bdf8"
set -g @c_rosewater "#f4dbd6"
set -g @c_overlay0 "#6e738d"
set -g @c_surface0 "#363a4f"
set -g @c_crust "#181926"

###############################################################################
### Plugin options (cpu/ram bg colors for load-based coloring)
###############################################################################

set -gq '@cpu_low_bg_color'    "#[bg=#a6da95]"
set -gq '@cpu_medium_bg_color' "#[bg=#eed49f]"
set -gq '@cpu_high_bg_color'   "#[bg=#ed8796]"
set -gq '@ram_low_bg_color'    "#[bg=#a6da95]"
set -gq '@ram_medium_bg_color' "#[bg=#eed49f]"
set -gq '@ram_high_bg_color'   "#[bg=#ed8796]"

###############################################################################
### Status bar
###############################################################################

set -g status-position top
set -g status-style "bg=#{@c_bg},fg=#{@c_fg}"
set -g status-justify "left"

# status left: mode | datetime
set -g status-left-length 60
set -g status-left ""
set -ga status-left "#{?#{==:#{client_key_table},off},#[fg=#{@c_red} bg=#{@c_bg}]#[bg=#{@c_red} fg=#{@c_crust} bold] PASSTHROUGH #[fg=#{@c_red} bg=#{@c_surface0}],#{?client_prefix,#[fg=#{@c_red} bg=#{@c_bg}]#[bg=#{@c_red} fg=#{@c_crust} bold] PREFIX #[fg=#{@c_red} bg=#{@c_surface0}],#{?#{==:#{pane_mode},copy-mode},#[fg=#{@c_yellow} bg=#{@c_bg}]#[bg=#{@c_yellow} fg=#{@c_crust} bold] COPY #[fg=#{@c_yellow} bg=#{@c_surface0}],#[fg=#{@c_green} bg=#{@c_bg}]#[bg=#{@c_green} fg=#{@c_crust} bold] NORMAL #[fg=#{@c_green} bg=#{@c_surface0}]}}}"
set -ga status-left "#[bg=#{@c_surface0} fg=#{@c_fg} nobold] 󰭦 %Y-%m-%d 󰅐 %H:%M:%S #[fg=#{@c_surface0} bg=#{@c_bg}] "

# status right: ip | cpu | ram | battery
# click status-right to toggle external IPv4/IPv6
bind-key -n MouseDown1StatusRight run-shell "tmux-external-ip --toggle"
bind-key -n MouseDown3StatusRight run-shell "tmux-external-ip | $COPY_CMD"
set -g status-right-length 150
set -g status-right ""
set -ga status-right "#[fg=#{@c_rosewater} bg=#{@c_bg}]#[bg=#{@c_rosewater} fg=#{@c_crust}] #(tmux-external-ip-icon) #(tmux-external-ip) "
set -ga status-right "#[fg=#{@c_lavender} bg=#{@c_rosewater}]#[bg=#{@c_lavender} fg=#{@c_crust}] #{primary_ip_icon} #{primary_ip} "
set -ga status-right "#[fg=#{@c_green} bg=#{@c_lavender}]#[bg=#{@c_green} fg=#{@c_crust}] 󰻠 #{cpu_percentage} "
set -ga status-right "#[fg=#{@c_blue} bg=#{@c_green}]#[bg=#{@c_blue} fg=#{@c_crust}] 󰍛 #{ram_percentage} "
set -ga status-right "#[fg=#{@c_peach} bg=#{@c_blue}]#[bg=#{@c_peach} fg=#{@c_crust}] #{battery_icon} #{battery_percentage} #[fg=#{@c_peach} bg=#{@c_bg}]"

###############################################################################
### Window look and feel
###############################################################################

set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@c_bg},fg=#{@c_rosewater}"
set -g window-status-last-style "bg=#{@c_bg},fg=#{@c_peach}"
set -g window-status-activity-style "bg=#{@c_red},fg=#{@c_bg}"
set -g window-status-bell-style "bg=#{@c_red},fg=#{@c_bg},bold"
set -g window-status-separator "#[bg=#{@c_bg},fg=#{@c_overlay0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@c_peach},fg=#{@c_bg},bold"

###############################################################################
### Pane borders
###############################################################################

setw -g pane-border-status top
setw -g pane-border-format " [ ###P #T ] "
setw -g pane-active-border-style "bg=#{@c_bg},fg=#{@c_overlay0}"
setw -g pane-border-style "bg=#{@c_bg},fg=#{@c_surface0}"
setw -g pane-border-lines double

###############################################################################
### Tmux Yank
###############################################################################

set -g @override_copy_command $COPY_CMD
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe'

#################################################################################
# Keybindings
#################################################################################

# Clear screen and scroll buffer
bind-key a \
    clear-history \; \
    send-keys 'clear' C-m \; \
    clear-history

# Set the scroll buffer to 50000 lines
set-option -g history-limit 50000

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Config: Reloaded"

################################################################################
# Copy mode
#################################################################################

# vi key bindings
set-window-option -g mode-keys vi

# Unbind triple click to get double click faster
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# Double click starts word selection, drag to extend, copy on release
bind-key -T copy-mode-vi DoubleClick1Pane \
    select-pane \; \
    send-keys -X select-word

bind-key -n DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word

# Copy happens on mouse release
bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-no-clear $COPY_CMD \; \
    send-keys -X cancel

#################################################################################
# Splitting and switching panes
#################################################################################

unbind '"'
unbind %

# Split panes with | and -, open in same directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# When splitting a pane, set the title to nothing
set-hook -g after-split-window 'selectp -T ""'

# F12 toggles outer tmux off, passing all keys to inner tmux
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#{@c_red},fg=#{@c_bg}" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

#################################################################################
# Local overrides
#################################################################################

# Source machine-local overrides if present
if '[ -f ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'

# Run the Tmux Plugin Manager (must be last)
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'

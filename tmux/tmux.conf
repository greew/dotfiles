# Copy command wrapper (falls back to no-op if no display)
COPY_CMD="$HOME/.local/bin/tmux-copy"

# Prefix: Ctrl+Space
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# show messages for 4 seconds instead
set -g display-time 4000

###############################################################################
### Load tmux plugins
###############################################################################

# Set up plugin manager
set-environment -gF TMUX_CONF_PATH '#{HOME}/.config/tmux'
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{TMUX_CONF_PATH}/plugins'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

# Load plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Standard plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Theme / style
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'dreknix/tmux-primary-ip'

# Configure Catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

## Load custom modules
source -F '#{TMUX_CONF_PATH}/custom_modules/ctp_datetime.conf'
source -F '#{TMUX_CONF_PATH}/custom_modules/primary_ip.conf'
source -F '#{TMUX_CONF_PATH}/custom_modules/ctp_cpu.conf'
source -F '#{TMUX_CONF_PATH}/custom_modules/ctp_memory.conf'

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?#{==:#{client_key_table},off},#[bg=#{@thm_red} fg=#{@thm_bg} bold] PASSTHROUGH ,#{?client_prefix,#[fg=#{@thm_red} bold]PREFIX ,#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow} bold]COPY ,#[fg=#{@thm_green} bold]NORMAL }}}"
set -agF status-left '#{E:@catppuccin_status_ctp_datetime}'
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -agF status-right '#{E:@catppuccin_status_primary_ip}'
set -agF status-right "#{E:@catppuccin_status_ctp_cpu}"
set -agF status-right "#{E:@catppuccin_status_ctp_memory}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format " [ ###P #T ] "
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines double

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Tmux Yank
set -g @override_copy_command $COPY_CMD
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe'

#################################################################################
# Keybindings
#################################################################################

# Clear screen and scroll buffer
bind-key a \
    clear-history \; \
    send-keys 'clear' C-m \; \
    clear-history

# Set the scroll buffer to 50000 lines
set-option -g history-limit 50000

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Config: Reloaded"

################################################################################
# Copy mode
#################################################################################

# vi key bindings
set-window-option -g mode-keys vi

# Unbind triple click to get double click faster
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# Double click starts word selection, drag to extend, copy on release
bind-key -T copy-mode-vi DoubleClick1Pane \
    select-pane \; \
    send-keys -X select-word

bind-key -n DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word

# Copy happens on mouse release
bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-no-clear $COPY_CMD \; \
    send-keys -X cancel

#################################################################################
# Splitting and switching panes
#################################################################################

unbind '"'
unbind %

# Split panes with | and -, open in same directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# When splitting a pane, set the title to nothing
set-hook -g after-split-window 'selectp -T ""'

# F12 toggles outer tmux off, passing all keys to inner tmux
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#{@thm_red},fg=#{@thm_bg}" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

#################################################################################
# Local overrides
#################################################################################

# Source machine-local overrides if present
if '[ -f ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'

# Run the Tmux Plugin Manager (must be last)
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'
